name: 'Spryx Deploy'
description: 'Deploy a Docker image to Railway'
inputs:
  service_id:
    description: 'Railway service ID'
    required: true
  image:
    description: 'Docker image to deploy (e.g. ghcr.io/org/app:v1.2.3)'
    required: true
  environment_id:
    description: 'Railway environment ID'
    required: true
  environment:
    description: 'Target environment name (staging or production)'
    required: true
  railway_token:
    description: 'Railway workspace token (used as Bearer token for the GraphQL API)'
    required: true
  deploy_wait_timeout_minutes:
    description: 'How long to wait for the Railway deployment to reach a terminal state (minutes)'
    required: false
    default: '10'
runs:
  using: 'node24'
  main: 'dist/index.js'
