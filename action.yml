name: 'Spryx Deploy'
description: 'Deploy to Railway with Sentry release tracking'
inputs:
  services:
    description: 'JSON array of { serviceId, image } pairs (e.g. ''[{"serviceId":"srv_xxx","image":"ghcr.io/org/app:v1.2.3"}]'')'
    required: true
  environment_id:
    description: 'Railway environment ID'
    required: true
  environment:
    description: 'Target environment name (staging or production)'
    required: true
  railway_token:
    description: 'Railway workspace token (used as Bearer token for the GraphQL API)'
    required: true
  release_name:
    description: 'Sentry release name (e.g. my-app@1.2.3)'
    required: true
  sentry_auth_token:
    description: 'Sentry auth token'
    required: false
  sentry_org:
    description: 'Sentry org slug'
    required: false
  sentry_projects:
    description: 'Comma-separated Sentry project slugs (e.g. "api,worker,bo-api")'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
