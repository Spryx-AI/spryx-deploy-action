name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [commitlint, typecheck, lint, format, test]
    steps:
      - name: Write job summary
        run: |
          function status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏸️" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          COMMITLINT=$(status_icon "${{ needs.commitlint.result }}")
          TYPECHECK=$(status_icon "${{ needs.typecheck.result }}")
          LINT=$(status_icon "${{ needs.lint.result }}")
          FORMAT=$(status_icon "${{ needs.format.result }}")
          TEST=$(status_icon "${{ needs.test.result }}")

          ALL_PASSED=$([[ "${{ needs.commitlint.result }}" == "success" && \
                         "${{ needs.typecheck.result }}" == "success" && \
                         "${{ needs.lint.result }}" == "success" && \
                         "${{ needs.format.result }}" == "success" && \
                         "${{ needs.test.result }}" == "success" ]] && echo "true" || echo "false")

          if [[ "$ALL_PASSED" == "true" ]]; then
            OVERALL="✅ All checks passed"
          else
            OVERALL="❌ Some checks failed"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## CI Summary — $OVERALL

          | Check | Result |
          |---|---|
          | Commitlint | $COMMITLINT ${{ needs.commitlint.result }} |
          | Typecheck | $TYPECHECK ${{ needs.typecheck.result }} |
          | Lint | $LINT ${{ needs.lint.result }} |
          | Format | $FORMAT ${{ needs.format.result }} |
          | Test | $TEST ${{ needs.test.result }} |

          **PR:** #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}
          **Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
          **Commit:** \`${{ github.event.pull_request.head.sha }}\`
          EOF
